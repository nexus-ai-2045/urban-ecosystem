id: wo-urban-010-human-readable-labels
title: "Human-readable Japanese labels for internal codes"
status: draft
owner_role: developer
support_roles:
  - test-agent
  - quality-gate

goal: >
  表示層で内部英語コードを日本語へ変換する。対象は POI カテゴリ・エージェント役割・
  交流イベント種別・行動理由。内部 JSONL / contract の値は英語コードのまま維持し、
  viewer 表示時にのみマップする。

context:
  must_read:
    - AGENTS.md
    - docs/ai-ecosystem-tool-spec.md  # §5.3 凡例・詳細パネル / §19.3.1 カテゴリ / §9.3 理由
    - docs/subagents/contracts/urban-ecosystem-data-contract.md

scope:
  allowed_write_paths:
    - tools/urban_viewer/
    - tests/tools/test_urban_viewer_server.py
    - tests/app/test_main.py
  read_only_paths:
    - environments/urban_2d/
  out_of_scope:
    - "内部データ値 (JSONL / contract の enum) は変更しない (表示層のみ変換)。"
    - "苗字表示は WO-007。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.3.0
  produces: []

depends_on:
  work_orders: []   # 独立 / 軽量

human_gates:
  before_start:
    - G0
  before_implementation: []
  before_long_run: []
  before_claiming_result: []
  before_integration:
    - G4

commands:
  required:
    - "python -m pytest tests/tools/test_urban_viewer_server.py tests/app/test_main.py -v -p no:cacheprovider"

acceptance:
  - "POI カテゴリ 12 種 (§19.3.1) が日本語表示される (例: amenity-cafe→カフェ)。"
  - "エージェント役割 3 種が日本語表示される (office_worker→会社員 / student→学生 / other→その他)。"
  - "交流イベント 4 種が日本語表示される (meeting→出会い / conversation→会話 / conflict→口論 / farewell→別れ)。"
  - "行動理由が日本語表示される (commute→通勤 / lunch→昼食 / errand→用事 / social→交流 / go_home→帰宅 / wander→散策 / work→仕事 / study→勉強)。"
  - "凡例 (legend) も日本語化される。"
  - "内部 JSONL / contract の値は英語コードのまま (後方互換)。未知コードはコードをそのまま表示する。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes: []
