id: wo-urban-020-cross-world-sentinel-entry
title: "MVP-001 Sentinel Operator Entry"
status: draft
owner_role: developer
support_roles:
  - scenario-designer
  - quality-gate

goal: >
  Cross-world Operator Mode の MVP-001 として、operator が抽象 agent を選び、
  inspection viewpoint へ入り、通常 replay へ戻る最小モードの実装境界を定義する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-001-sentinel-entry.md
  references:
    - docs/cross-world-operator-roadmap.md
    - docs/subagents/work-orders/wo-urban-019-cross-world-operator-todo.yaml

scope:
  allowed_write_paths:
    - docs/cross-world-operator-mvp-001-sentinel-entry.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-todo.md
    - docs/subagents/work-orders/wo-urban-020-cross-world-sentinel-entry.yaml
  read_only_paths:
    - app/
    - tools/
    - tests/
    - docs/subagents/contracts/
  out_of_scope:
    - "この work order 作成 PR では実装コード、data contract、generated docs、テストコードを変更しない。"
    - "protected phrase、作品名、キャラクター名を public implementation ID として使わない。"
    - "agent人格再現、real-person identity、外部作品由来の振る舞い再現をしない。"
    - "simulation state を変更する control mode は MVP-001 には含めない。"
    - "cloud command、external API、Discord投稿、Linear issue作成、GitHub issue作成を行わない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-019-cross-world-operator-todo

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`docs/cross-world-operator-mvp-001-sentinel-entry.md` が追加され、entry / inspection / return の最小フローを日本語で説明している。"
  - "`XWORLD-TODO-001`、`XWORLD-TODO-002`、`XWORLD-TODO-039` だけを MVP-001 の対象としている。"
  - "failure state と trigger boundary が明記されている。"
  - "protected phrase、作品名、キャラクター名、私的path、外部投稿本文を public implementation ID として使っていない。"
  - "PR本文、handoff、review notes は日本語を基本にする。"
  - "実装コード、data contract、cloud/API、Linear issue、Discord投稿は変更・作成していない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この work order は MVP-001 の実装着手前spec。実装PRは別branchで切る。"
