id: wo-urban-031-cross-world-motif-arc-prototype
title: "MVP-004 Motif Arc Pack Prototype"
status: draft
cross_world_operator_version: 0.5.0
owner_role: developer
support_roles:
  - scenario-designer
  - quality-gate

goal: >
  Cross-world Operator Mode の MVP-004 実装PRとして、public-safe motif arc packを
  viewer上で選択・評価できる toy prototype を追加する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-mvp-004-motif-arc-pack.md
    - docs/subagents/work-orders/wo-urban-023-cross-world-motif-arc-pack.yaml
    - docs/subagents/work-orders/wo-urban-029-cross-world-world-bridge-prototype.yaml
    - docs/subagents/work-orders/wo-urban-030-cross-world-guide-roster-prototype.yaml

scope:
  allowed_write_paths:
    - tools/urban_viewer_server.py
    - tools/urban_viewer/app.js
    - tools/urban_viewer/index.html
    - tools/urban_viewer/styles.css
    - tools/urban_viewer/ui_panels.js
    - tests/tools/test_urban_viewer_server.py
    - tests/tools/test_docs_sync_check.py
    - tools/docs_sync_check.py
    - docs/generated/current-capabilities.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-todo.html
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-004-motif-arc-pack.md
    - docs/subagents/work-orders/wo-urban-031-cross-world-motif-arc-prototype.yaml
  read_only_paths:
    - docs/subagents/contracts/
  out_of_scope:
    - "data contract を変更しない。"
    - "作品名・キャラクター名・引用台詞を public implementation ID として使わない。"
    - "narrative detail、plot再現、固有設定の再現をしない。"
    - "real-person identity、brand固有event、外部投稿本文を再現しない。"
    - "harmful procedure、real-person targeting、private data inferenceを含めない。"
    - "cloud command、external API、Discord投稿、Linear issue作成、GitHub issue作成を行わない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-023-cross-world-motif-arc-pack
    - wo-urban-029-cross-world-world-bridge-prototype
    - wo-urban-030-cross-world-guide-roster-prototype

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/tools/test_urban_viewer_server.py tests/tools/test_docs_sync_check.py -q -p no:cacheprovider"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`GET /api/motif-arcs` が public-safe motif arc pack、guarantees、active motifを返す。"
  - "`POST /api/motif-arcs/evaluate` が定義済みpublic-safe motifだけを評価し、未定義motifを `motif_name_not_safe` で拒否する。"
  - "9つのmotif arcと `Next Motif Expansion Slot` がArchetype guaranteeとWorld guaranteeを持つ。"
  - "UI からMotif Arc panelでmotifを選択し、Archetype ready / World ready / coreを確認できる。"
  - "Next Motif Expansion SlotはTODO IDまたは分類が必要であることを返す。"
  - "simulation state、data contract、cloud/API/Discord/Linear/GitHub issue は変更しない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この prototype は process-local viewer state だけを扱う。MVP-005のassessment / benchmark labへ安全なmotif評価対象を渡す。"
