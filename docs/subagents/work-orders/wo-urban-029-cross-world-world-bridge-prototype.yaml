id: wo-urban-029-cross-world-world-bridge-prototype
title: "MVP-002 World Bridge State Model Prototype"
status: draft
cross_world_operator_version: 0.3.0
owner_role: developer
support_roles:
  - scenario-designer
  - quality-gate

goal: >
  Cross-world Operator Mode の MVP-002 実装PRとして、physical / simulated / liminal の
  三層world layerをviewer上で確認し、許可されたlayer transitionだけを行う toy prototype を追加する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-mvp-002-world-bridge.md
    - docs/subagents/work-orders/wo-urban-021-cross-world-bridge-state-model.yaml
    - docs/subagents/work-orders/wo-urban-028-cross-world-sentinel-entry-prototype.yaml

scope:
  allowed_write_paths:
    - tools/urban_viewer_server.py
    - tools/urban_viewer/app.js
    - tools/urban_viewer/index.html
    - tools/urban_viewer/styles.css
    - tools/urban_viewer/ui_panels.js
    - tests/tools/test_urban_viewer_server.py
    - tests/tools/test_docs_sync_check.py
    - tools/docs_sync_check.py
    - docs/generated/current-capabilities.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-002-world-bridge.md
    - docs/subagents/work-orders/wo-urban-029-cross-world-world-bridge-prototype.yaml
  read_only_paths:
    - docs/subagents/contracts/
  out_of_scope:
    - "data contract を変更しない。"
    - "simulation state を変更する control mode は含めない。"
    - "WebAudio、音源生成、asset追加、real-world event再現は含めない。"
    - "protected phrase、作品名、キャラクター名を public implementation ID として使わない。"
    - "cloud command、external API、Discord投稿、Linear issue作成、GitHub issue作成を行わない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-021-cross-world-bridge-state-model
    - wo-urban-028-cross-world-sentinel-entry-prototype

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/tools/test_urban_viewer_server.py tests/tools/test_docs_sync_check.py -q -p no:cacheprovider"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`GET /api/world-bridge` が runtime-only の current layer、available layers、allowed transitions、Minimum World Packet、Event + Music signalを返す。"
  - "`POST /api/world-bridge/transition` が `target_layer`、`reason_class`、`requires_agent_context` を検証する。"
  - "`physical` と `simulated` の直行を禁止し、`liminal` 経由を要求する。"
  - "`requires_agent_context: true` の場合、MVP-001 operator entry後だけtransitionを許可する。"
  - "UI から現在layer、Minimum World Packet、Event + Music signalを確認し、layer transitionを試せる。"
  - "simulation state、data contract、cloud/API/Discord/Linear/GitHub issue は変更しない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この prototype は process-local viewer state だけを扱う。8-bit WebAudio cueは後続MVP候補に残す。"
