id: wo-urban-024-cross-world-assessment-benchmark-lab
title: "MVP-005 Assessment And Benchmark Lab"
status: draft
cross_world_operator_version: 0.1.6
owner_role: developer
support_roles:
  - scenario-designer
  - quality-gate
  - safety-reviewer

goal: >
  Cross-world Operator Mode の MVP-005 として、Human/AI assessment、
  post-singularity境界、chaotic benchmark、frontier capability、scale benchmark、
  agent harnessを公開安全な評価枠として定義する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-004-motif-arc-pack.md
    - docs/cross-world-operator-mvp-005-assessment-benchmark-lab.md
  references:
    - docs/subagents/work-orders/wo-urban-023-cross-world-motif-arc-pack.yaml

scope:
  allowed_write_paths:
    - README.md
    - docs/cross-world-operator-mvp-005-assessment-benchmark-lab.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/subagents/work-orders/wo-urban-024-cross-world-assessment-benchmark-lab.yaml
    - tools/docs_sync_check.py
    - tests/tools/test_docs_sync_check.py
  read_only_paths:
    - app/
    - docs/subagents/contracts/
  out_of_scope:
    - "この work order 作成 PR では実装コード、data contract、generated docsを変更しない。"
    - "deceptionを目的にした評価をしない。"
    - "dangerous live test、危険手順、実世界対象の追跡や操作を含めない。"
    - "private capability claim、lab/model ranking、未検証の性能断定をしない。"
    - "外部投稿本文、私的path、未レビュー引用をpublic docsに出さない。"
    - "cloud command、external API、Discord投稿、Linear issue作成、GitHub issue作成を行わない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-023-cross-world-motif-arc-pack

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`docs/cross-world-operator-mvp-005-assessment-benchmark-lab.md` が追加され、6つの評価カテゴリを日本語で説明している。"
  - "`XWORLD-TODO-016`、`XWORLD-TODO-020`、`XWORLD-TODO-021`、`XWORLD-TODO-022`、`XWORLD-TODO-023`、`XWORLD-TODO-028` だけを MVP-005 の対象としている。"
  - "Cross-world Operator Mode docs package version を `0.1.6` にし、意味単位の自動version更新ルールに従っている。"
  - "Human/AI assessmentをdeceptionではなくhuman-likeness、intention inference、boundary recognitionとして扱っている。"
  - "benchmarkごとに入力、出力、不合格条件がある。"
  - "protected phrase、作品名、キャラクター名、私的path、外部投稿本文を public implementation ID として使っていない。"
  - "実装コード、data contract、cloud/API、Linear issue、Discord投稿は変更・作成していない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この work order は MVP-005 の実装着手前spec。評価結果の意思決定利用はMVP-006で扱う。"
