  - governance-reviewer

goal: >
  Cross-world Operator Mode の MVP-006 として、FDE packet、三権分立風の
  proposal / review / execution / oversight分離、user oversight、
  three AI branches + meta-user構造、skill mesh / orchestration pack前提を
  公開安全な意思決定枠として定義する。

