    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`docs/cross-world-operator-mvp-006-governance-fractal-decision.md` が追加され、governance layerとFDE packetを日本語で説明している。"
  - "`XWORLD-TODO-024`、`XWORLD-TODO-025`、`XWORLD-TODO-026`、`XWORLD-TODO-027`、`XWORLD-TODO-029`、`XWORLD-TODO-030` だけを MVP-006 の対象としている。"
  - "Cross-world Operator Mode docs package version を `0.1.8` にし、意味単位の自動version更新ルールに従っている。"
  - "userをagentではなくexternal monitor / fourth-power oversightとして定義している。"
  - "proposal / review / execution / oversightが分離されている。"
  - "Cross-world Operator Modeをskill meshとorchestration packにする前提を明記している。"
  - "Numeric Operating Protocolはparking-lotのまま、理由と再確認条件がある。"
  - "実装コード、data contract、cloud/API、Linear issue、Discord投稿は変更・作成していない。"

handoff:
