id: wo-urban-023-cross-world-motif-arc-pack
title: "MVP-004 Motif Arc Pack"
status: draft
cross_world_operator_version: 0.1.5
owner_role: developer
support_roles:
  - scenario-designer
  - quality-gate

goal: >
  Cross-world Operator Mode の MVP-004 として、追加motifを人物名や作品名ではなく
  world structure / behavior pattern / pressure / gateとして受け入れる基準を定義する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-002-world-bridge.md
    - docs/cross-world-operator-mvp-003-guide-agent-roster.md
    - docs/cross-world-operator-mvp-004-motif-arc-pack.md
  references:
    - docs/subagents/work-orders/wo-urban-021-cross-world-bridge-state-model.yaml
    - docs/subagents/work-orders/wo-urban-022-cross-world-guide-agent-roster.yaml

scope:
  allowed_write_paths:
    - README.md
    - docs/cross-world-operator-mvp-004-motif-arc-pack.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/subagents/work-orders/wo-urban-023-cross-world-motif-arc-pack.yaml
    - tools/docs_sync_check.py
    - tests/tools/test_docs_sync_check.py
  read_only_paths:
    - app/
    - docs/subagents/contracts/
  out_of_scope:
    - "この work order 作成 PR では実装コード、data contract、generated docsを変更しない。"
    - "作品名・キャラクター名・引用台詞を public implementation ID として使わない。"
    - "narrative detail、plot再現、固有設定の再現をしない。"
    - "real-person identity、brand固有event、外部投稿本文を再現しない。"
    - "harmful procedure、real-person targeting、private data inferenceを含めない。"
    - "cloud command、external API、Discord投稿、Linear issue作成、GitHub issue作成を行わない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-021-cross-world-bridge-state-model
    - wo-urban-022-cross-world-guide-agent-roster

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`docs/cross-world-operator-mvp-004-motif-arc-pack.md` が追加され、9つのmotif arcとNext Motif Expansion Slotを日本語で説明している。"
  - "`XWORLD-TODO-007` から `XWORLD-TODO-015` と `XWORLD-TODO-019` だけを MVP-004 の対象としている。"
  - "Cross-world Operator Mode docs package version を `0.1.5` にし、意味単位の自動version更新ルールに従っている。"
  - "Archetype guarantee と World guarantee が明記されている。"
  - "人物だけの追加は禁止され、Minimum World Packet不足時は watch / parking-lot に戻す。"
  - "protected phrase、作品名、キャラクター名、私的path、外部投稿本文を public implementation ID として使っていない。"
  - "実装コード、data contract、cloud/API、Linear issue、Discord投稿は変更・作成していない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この work order は MVP-004 の実装着手前spec。motif arcをMVP-005のassessment / benchmark labに渡す前の公開安全境界を固定する。"
