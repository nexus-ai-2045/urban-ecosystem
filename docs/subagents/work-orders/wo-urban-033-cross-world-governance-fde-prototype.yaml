id: wo-urban-033-cross-world-governance-fde-prototype
title: "MVP-006 Governance And Fractal Decision Prototype"
status: draft
cross_world_operator_version: 0.7.0
owner_role: developer
support_roles:
  - governance-reviewer
  - quality-gate

goal: >
  Cross-world Operator Mode の MVP-006 実装PRとして、governance layerとFDE packetを
  viewer上で確認・判定できる toy prototype を追加する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-mvp-006-governance-fractal-decision.md
    - docs/subagents/work-orders/wo-urban-025-cross-world-governance-fractal-decision.yaml
    - docs/subagents/work-orders/wo-urban-032-cross-world-assessment-benchmark-prototype.yaml

scope:
  allowed_write_paths:
    - tools/urban_viewer_server.py
    - tools/urban_viewer/app.js
    - tools/urban_viewer/index.html
    - tools/urban_viewer/styles.css
    - tools/urban_viewer/ui_panels.js
    - tests/tools/test_urban_viewer_server.py
    - tests/tools/test_docs_sync_check.py
    - tools/docs_sync_check.py
    - docs/generated/current-capabilities.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-todo.html
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-006-governance-fractal-decision.md
    - docs/subagents/work-orders/wo-urban-033-cross-world-governance-fde-prototype.yaml
  read_only_paths:
    - docs/subagents/contracts/
  out_of_scope:
    - "data contract を変更しない。"
    - "userを自動agentとして扱わない。"
    - "human approvalを省略するclosed-loop automationを実装しない。"
    - "prophecy、inevitable future、未検証の未来断定をしない。"
    - "numeric meaningを実装根拠として確定しない。"
    - "external API、Discord投稿、Linear issue作成、GitHub issue作成を行わない。"
    - "loop guard、allowed I/O、human gateが未定義のrecursive skill callを実装しない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-025-cross-world-governance-fractal-decision
    - wo-urban-032-cross-world-assessment-benchmark-prototype

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/tools/test_urban_viewer_server.py tests/tools/test_docs_sync_check.py -q -p no:cacheprovider"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`GET /api/governance-fde` がproposal / review / execution / oversight、FDE steps、decision候補、numeric parking-lot、oversight boundaryを返す。"
  - "`POST /api/governance-fde/decide` が定義済みdecisionだけを評価し、`proceed` にはtests、scan、review相当のevidenceを要求する。"
  - "human gate省略、user agent化、future overreach、numeric overreach、unbounded recursionを拒否する。"
  - "UI から Governance panel でdecision、oversight、FDE steps、numeric parking-lotを確認できる。"
  - "simulation data contract、Discord、Linear issue、GitHub issue は変更しない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この prototype はstateless responseとしてFDE decision結果を返す。MVP-007のrepo-as-skill / distributed opsへloop guardとoversight boundaryを渡す。"
