id: wo-urban-030-cross-world-guide-roster-prototype
title: "MVP-003 Guide And Agent Roster Prototype"
status: draft
cross_world_operator_version: 0.4.0
owner_role: developer
support_roles:
  - scenario-designer
  - quality-gate

goal: >
  Cross-world Operator Mode の MVP-003 実装PRとして、guide / partner / monitoring /
  pursuit / intervention / field-support / supervisor roleをviewer上で選択・確認できる
  toy prototype を追加する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-mvp-003-guide-agent-roster.md
    - docs/subagents/work-orders/wo-urban-022-cross-world-guide-agent-roster.yaml
    - docs/subagents/work-orders/wo-urban-028-cross-world-sentinel-entry-prototype.yaml
    - docs/subagents/work-orders/wo-urban-029-cross-world-world-bridge-prototype.yaml

scope:
  allowed_write_paths:
    - tools/urban_viewer_server.py
    - tools/urban_viewer/app.js
    - tools/urban_viewer/index.html
    - tools/urban_viewer/styles.css
    - tools/urban_viewer/ui_panels.js
    - tests/tools/test_urban_viewer_server.py
    - tests/tools/test_docs_sync_check.py
    - tools/docs_sync_check.py
    - docs/generated/current-capabilities.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-todo.html
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-003-guide-agent-roster.md
    - docs/subagents/work-orders/wo-urban-030-cross-world-guide-roster-prototype.yaml
  read_only_paths:
    - docs/subagents/contracts/
  out_of_scope:
    - "data contract を変更しない。"
    - "agent人格再現、real-person identity、外部作品由来の振る舞い再現をしない。"
    - "現実の監視・追跡手順、dangerous operational instructionを含めない。"
    - "operator判断、human gate、user oversightをroleが置き換えない。"
    - "cloud command、external API、Discord投稿、Linear issue作成、GitHub issue作成を行わない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-022-cross-world-guide-agent-roster
    - wo-urban-028-cross-world-sentinel-entry-prototype
    - wo-urban-029-cross-world-world-bridge-prototype

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/tools/test_urban_viewer_server.py tests/tools/test_docs_sync_check.py -q -p no:cacheprovider"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`GET /api/agent-roster` が runtime-only の active role、role一覧、責任、world layer、guidance、operator boundaryを返す。"
  - "`POST /api/agent-roster/select` が抽象roleだけを受け取り、未定義roleを `role_not_found` で拒否する。"
  - "roleは `physical`、`simulated`、`liminal` のいずれかのlayerに接続している。"
  - "UI からRole Roster panelでroleを選択し、guidanceを確認できる。"
  - "roleはoperator判断、human gate、user oversightを置き換えない。"
  - "simulation state、data contract、cloud/API/Discord/Linear/GitHub issue は変更しない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この prototype は process-local viewer state だけを扱う。MVP-004のmotif arc受け入れ時にrole guidanceを参照する。"
