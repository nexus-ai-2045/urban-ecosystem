id: wo-urban-028-cross-world-sentinel-entry-prototype
title: "MVP-001 Sentinel Operator Entry Prototype"
status: draft
cross_world_operator_version: 0.2.0
owner_role: developer
support_roles:
  - scenario-designer
  - quality-gate

goal: >
  Cross-world Operator Mode の MVP-001 実装PRとして、operator が選択中の抽象 agent の
  inspection viewpoint へ入り、replay viewpoint へ戻る toy prototype を追加する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-mvp-001-sentinel-entry.md
    - docs/subagents/work-orders/wo-urban-020-cross-world-sentinel-entry.yaml

scope:
  allowed_write_paths:
    - tools/urban_viewer_server.py
    - tools/urban_viewer/app.js
    - tools/urban_viewer/index.html
    - tools/urban_viewer/styles.css
    - tools/urban_viewer/ui_panels.js
    - tests/tools/test_urban_viewer_server.py
    - docs/generated/current-capabilities.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-001-sentinel-entry.md
    - docs/subagents/work-orders/wo-urban-028-cross-world-sentinel-entry-prototype.yaml
  read_only_paths:
    - docs/subagents/contracts/
  out_of_scope:
    - "data contract を変更しない。"
    - "agent人格再現、real-person identity、外部作品由来の振る舞い再現をしない。"
    - "protected phrase、作品名、キャラクター名を public implementation ID として使わない。"
    - "simulation state を変更する control mode は含めない。"
    - "cloud command、external API、Discord投稿、Linear issue作成、GitHub issue作成を行わない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-020-cross-world-sentinel-entry

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/tools/test_urban_viewer_server.py -q -p no:cacheprovider"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`GET /api/operator-mode` が runtime-only の replay / inspection 状態を返す。"
  - "`POST /api/operator-mode/entry` が `run_id` と `agent_id` を検証し、存在する agent だけ inspection viewpoint に入れる。"
  - "`POST /api/operator-mode/return` が replay viewpoint へ戻す。"
  - "public API は `trigger_text` を受け取らず、公開安全な `trigger_class` だけを扱う。"
  - "UI から選択中 agent へ entry / return できる。"
  - "simulation state、data contract、cloud/API/Discord/Linear/GitHub issue は変更しない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この prototype は process-local viewer state だけを扱う。MVP-002以降のworld layerとは別PRで接続する。"
