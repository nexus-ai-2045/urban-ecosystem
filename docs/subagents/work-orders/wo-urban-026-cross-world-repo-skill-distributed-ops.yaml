id: wo-urban-026-cross-world-repo-skill-distributed-ops
title: "MVP-007 Repo-as-Skill And Distributed Ops"
status: draft
cross_world_operator_version: 0.1.9
owner_role: developer
support_roles:
  - architect
  - quality-gate
  - governance-reviewer

goal: >
  Cross-world Operator Mode の MVP-007 として、repo-as-skill mesh、recursive skill call、
  P2P distributed operations、cloud capacity envelopeの実装前安全境界を定義する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-006-governance-fractal-decision.md
    - docs/cross-world-operator-mvp-007-repo-skill-distributed-ops.md
  references:
    - docs/subagents/work-orders/wo-urban-025-cross-world-governance-fractal-decision.yaml

scope:
  allowed_write_paths:
    - README.md
    - docs/cross-world-operator-mvp-007-repo-skill-distributed-ops.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/subagents/work-orders/wo-urban-026-cross-world-repo-skill-distributed-ops.yaml
    - tools/docs_sync_check.py
    - tests/tools/test_docs_sync_check.py
  read_only_paths:
    - app/
    - docs/subagents/contracts/
  out_of_scope:
    - "この work order 作成 PR では実装コード、data contract、generated docsを変更しない。"
    - "cloud resource作成、credential作成、billing変更を行わない。"
    - "external API実行、GCP command実行、Discord投稿、Linear issue作成、GitHub issue作成を行わない。"
    - "P2P実運用、実ノード参加、実ユーザー間同期を行わない。"
    - "recursive skill callを実装しない。"
    - "loop guardなしのrepo traversalを行わない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-025-cross-world-governance-fractal-decision

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`docs/cross-world-operator-mvp-007-repo-skill-distributed-ops.md` が追加され、repo-as-skill meshとrecursive skill call guardを日本語で説明している。"
  - "`XWORLD-TODO-031`、`XWORLD-TODO-032`、`XWORLD-TODO-033` だけを MVP-007 の対象としている。"
  - "Cross-world Operator Mode docs package version を `0.1.9` にし、意味単位の自動version更新ルールに従っている。"
  - "recursive skill callにmaximum depth、allowed I/O、stop condition、loop guardがある。"
  - "P2Pはidentity、trust、moderation、abuse resistanceが未定義なら実装しない。"
  - "Cloud Capacity Envelopeにaccount、cost、quota、billing、region、rollback、approval boundaryがある。"
  - "実装コード、data contract、cloud/API、Linear issue、Discord投稿は変更・作成していない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この work order は MVP-007 の実装着手前spec。MVP-008へdraft-only intake lifecycleとheartbeat boundaryを渡す。"
