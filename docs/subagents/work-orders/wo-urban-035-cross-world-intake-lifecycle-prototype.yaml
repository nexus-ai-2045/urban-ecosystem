id: wo-urban-035-cross-world-intake-lifecycle-prototype
title: "MVP-008 Intake Lifecycle And Worldbuilding Pipeline Prototype"
status: draft
cross_world_operator_version: 0.9.0
owner_role: developer
support_roles:
  - intake-reviewer
  - quality-gate
  - governance-reviewer

goal: >
  Cross-world Operator Mode の MVP-008 実装PRとして、worldbuilding extraction、
  public-safe validator、add request intake、orphan / stale / heartbeat trackingを
  viewer上で確認できる toy prototype として追加する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-mvp-008-intake-lifecycle-worldbuilding.md
    - docs/subagents/work-orders/wo-urban-027-cross-world-intake-lifecycle-worldbuilding.yaml
    - docs/subagents/work-orders/wo-urban-034-cross-world-repo-skill-distributed-ops-prototype.yaml

scope:
  allowed_write_paths:
    - tools/urban_viewer_server.py
    - tools/urban_viewer/app.js
    - tools/urban_viewer/index.html
    - tools/urban_viewer/styles.css
    - tools/urban_viewer/ui_panels.js
    - tests/tools/test_urban_viewer_server.py
    - tests/tools/test_docs_sync_check.py
    - tools/docs_sync_check.py
    - docs/generated/current-capabilities.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-todo.html
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-008-intake-lifecycle-worldbuilding.md
    - docs/subagents/work-orders/wo-urban-035-cross-world-intake-lifecycle-prototype.yaml
  read_only_paths:
    - docs/subagents/contracts/
  out_of_scope:
    - "data contract を変更しない。"
    - "GitHub issue、Linear issue、Discord投稿の自動作成を行わない。"
    - "private source content、外部投稿本文、私的path、固有作品名・キャラクター名を公開しない。"
    - "cloud resource作成、credential作成、billing変更、external API実行を行わない。"
    - "自動close、自動公開、自動mergeを行わない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-027-cross-world-intake-lifecycle-worldbuilding
    - wo-urban-034-cross-world-repo-skill-distributed-ops-prototype

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/tools/test_urban_viewer_server.py tests/tools/test_docs_sync_check.py -q -p no:cacheprovider"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`GET /api/intake-lifecycle` がintake pipeline、validator、Minimum World Packet、lifecycle guardを返す。"
  - "`POST /api/intake-lifecycle/draft` が公開安全なdraft candidateだけを受け入れる。"
  - "external write、private source content、validator hit、TODO欠落、world packet不足、orphan threshold超過、stale自己申告不足、heartbeat不足を拒否する。"
  - "UI から Intake panel でrequest class、source category、world packet、lifecycle boundary、draft candidateを確認できる。"
  - "simulation data contract、cloud/API/Discord/Linear/GitHub issue は変更しない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この prototype はstateless responseとしてintake lifecycle guard stateを返す。Linear本体への起票は人間レビュー後の別stepにする。"
