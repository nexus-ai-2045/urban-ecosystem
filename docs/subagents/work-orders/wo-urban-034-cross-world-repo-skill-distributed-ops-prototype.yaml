id: wo-urban-034-cross-world-repo-skill-distributed-ops-prototype
title: "MVP-007 Repo-as-Skill And Distributed Ops Prototype"
status: draft
cross_world_operator_version: 0.8.0
owner_role: developer
support_roles:
  - orchestration-reviewer
  - quality-gate

goal: >
  Cross-world Operator Mode の MVP-007 実装PRとして、repo-as-skill mesh、
  recursive skill call guard、P2P design-spike境界、Cloud Capacity Envelopeを
  viewer上で確認できる toy prototype を追加する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-mvp-007-repo-skill-distributed-ops.md
    - docs/subagents/work-orders/wo-urban-026-cross-world-repo-skill-distributed-ops.yaml
    - docs/subagents/work-orders/wo-urban-033-cross-world-governance-fde-prototype.yaml

scope:
  allowed_write_paths:
    - tools/urban_viewer_server.py
    - tools/urban_viewer/app.js
    - tools/urban_viewer/index.html
    - tools/urban_viewer/styles.css
    - tools/urban_viewer/ui_panels.js
    - tests/tools/test_urban_viewer_server.py
    - tests/tools/test_docs_sync_check.py
    - tools/docs_sync_check.py
    - docs/generated/current-capabilities.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-todo.html
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-007-repo-skill-distributed-ops.md
    - docs/subagents/work-orders/wo-urban-034-cross-world-repo-skill-distributed-ops-prototype.yaml
  read_only_paths:
    - docs/subagents/contracts/
  out_of_scope:
    - "data contract を変更しない。"
    - "recursive skill callの実行エンジンを作らない。"
    - "P2P実運用、実ノード参加、実ユーザー間同期を実装しない。"
    - "cloud resource作成、credential作成、billing変更、GCP command実行を行わない。"
    - "external API、Discord投稿、Linear issue作成、GitHub issue作成を行わない。"
    - "loop guard、allowed I/O、human gateが未定義のrepo traversalを許可しない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-026-cross-world-repo-skill-distributed-ops
    - wo-urban-033-cross-world-governance-fde-prototype

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/tools/test_urban_viewer_server.py tests/tools/test_docs_sync_check.py -q -p no:cacheprovider"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`GET /api/repo-skill-mesh` が8つのskill family、recursive guard、P2P/cloud境界、external write禁止状態を返す。"
  - "`POST /api/repo-skill-mesh/evaluate` が定義済みskill familyとguard付きplanだけを受け入れる。"
  - "allowed I/O不足、loop guard不足、depth超過、P2P実運用化、cloud実行、外部writeを拒否する。"
  - "UI から Repo Skill panel でskill family、maximum depth、P2P design-spike、cloud approval boundary、guard statusを確認できる。"
  - "simulation data contract、recursive call実行エンジン、P2P実運用、cloud/API/Discord/Linear/GitHub issue は変更しない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この prototype はstateless responseとしてrepo-as-skill guard stateを返す。MVP-008のdraft-only intake lifecycleへ、allowed I/Oとexternal write boundaryを渡す。"
