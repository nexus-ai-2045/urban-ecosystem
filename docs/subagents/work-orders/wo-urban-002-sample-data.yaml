id: wo-urban-002-sample-data
title: "Urban ecosystem sample data generator"
status: draft
owner_role: developer
support_roles:
  - test-agent

goal: >
  Create a deterministic sample data generator that emits a small Shibuya-like
  urban dataset conforming to the urban ecosystem data contract.

context:
  must_read:
    - AGENTS.md
    - docs/ai-ecosystem-tool-spec.md
    - docs/ai-ecosystem-implementation-orchestration.md
    - docs/subagents/contracts/urban-ecosystem-data-contract.md
  references:
    - docs/ai-ecosystem-tool-transcript.md

scope:
  allowed_write_paths:
    - tools/generate_urban_sample.py
    - tests/tools/test_generate_urban_sample.py
  read_only_paths:
    - environments/urban_2d/
    - core/
    - materials/
  out_of_scope:
    - "Do not implement the browser viewer in this work order."
    - "Do not write large generated sample outputs into the repository."
    - "Do not use external map APIs."

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.2.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-001-data-loader

human_gates:
  before_start:
    - G0
  before_implementation: []
  before_long_run: []
  before_claiming_result: []
  before_integration:
    - G4

commands:
  required:
    - "python -m pytest tests/tools/test_generate_urban_sample.py -v -p no:cacheprovider"
  optional:
    - "python tools/generate_urban_sample.py --out /tmp/urban_sample --agents 100 --pois 300 --ticks 24 --seed 42"

# scope (2026-05-29 CEO 確定 / spec §19 準拠): 静的データのみを生成する。
# 挙動ログ (agent_states / poi_visit_records / interaction_events) は
# WO-URBAN-004 Rule Simulation の責務であり本 WO では生成しない。
acceptance:
  - "The generator emits pois.geojson, aois.geojson, roadnet.geojson, agent_profiles_N100.json, and summary.json (static input data only)."
  - "Behavioral logs (agent_states.jsonl / poi_visit_records.jsonl / interaction_events.jsonl) are NOT produced here — they belong to WO-URBAN-004."
  - "The default output has 100 agents, 300 POIs, 10 AOIs, ~299 roads; summary.ticks defaults to 24."
  - "POI category distribution matches spec §19.3.1; all coordinates stay within the §19.2 bbox."
  - "Generated static files (pois/aois/roadnet/agent_profiles) are byte-identical (sha256) across runs with a fixed --seed; summary.json is excluded (contains started_at)."
  - "All generated output passes data_loader validation (§13.1) with zero dangling poi_id/agent_id references."
  - "No generated output is committed by default (data/ is gitignored)."

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes: []
