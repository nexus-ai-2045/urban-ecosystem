id: wo-urban-022-cross-world-guide-agent-roster
title: "MVP-003 Guide And Agent Roster"
status: draft
cross_world_operator_version: 0.1.4
owner_role: developer
support_roles:
  - scenario-designer
  - quality-gate

goal: >
  Cross-world Operator Mode の MVP-003 として、guide / partner / monitoring /
  pursuit / intervention / field-support / supervisor role を抽象archetypeとして整理し、
  operator entry と world bridge に接続する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-001-sentinel-entry.md
    - docs/cross-world-operator-mvp-002-world-bridge.md
    - docs/cross-world-operator-mvp-003-guide-agent-roster.md
  references:
    - docs/subagents/work-orders/wo-urban-020-cross-world-sentinel-entry.yaml
    - docs/subagents/work-orders/wo-urban-021-cross-world-bridge-state-model.yaml

scope:
  allowed_write_paths:
    - README.md
    - docs/cross-world-operator-mvp-003-guide-agent-roster.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/subagents/work-orders/wo-urban-022-cross-world-guide-agent-roster.yaml
    - tools/docs_sync_check.py
    - tests/tools/test_docs_sync_check.py
  read_only_paths:
    - app/
    - docs/subagents/contracts/
  out_of_scope:
    - "この work order 作成 PR では実装コード、data contract、generated docsを変更しない。"
    - "外部作品の人物構造をそのままroster化しない。"
    - "agent人格再現、real-person identity、外部作品由来の振る舞い再現をしない。"
    - "exploit-like procedure、dangerous operational instruction、現実の監視・追跡手順を含めない。"
    - "operatorがsimulation stateを直接変更するcontrol modeは含めない。"
    - "cloud command、external API、Discord投稿、Linear issue作成、GitHub issue作成を行わない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-020-cross-world-sentinel-entry
    - wo-urban-021-cross-world-bridge-state-model

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional: []

acceptance:
  - "`docs/cross-world-operator-mvp-003-guide-agent-roster.md` が追加され、guide / partner / monitoring / pursuit / intervention / field-support / supervisor roleを日本語で説明している。"
  - "`XWORLD-TODO-004`、`XWORLD-TODO-005`、`XWORLD-TODO-006` だけを MVP-003 の対象としている。"
  - "Cross-world Operator Mode docs package version を `0.1.4` にし、意味単位の自動version更新ルールに従っている。"
  - "operator controlとcompanion guidanceの責任範囲が分かれている。"
  - "各roleが physical / simulated / liminal のどこに接続するか説明できる。"
  - "protected phrase、作品名、キャラクター名、私的path、外部投稿本文を public implementation ID として使っていない。"
  - "実装コード、data contract、cloud/API、Linear issue、Discord投稿は変更・作成していない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この work order は MVP-003 の実装着手前spec。role setがMVP-004のmotif arc受け入れに使えることを次に確認する。"
