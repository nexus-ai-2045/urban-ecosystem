id: wo-urban-027-cross-world-intake-lifecycle-worldbuilding
title: "MVP-008 Intake Lifecycle And Worldbuilding Pipeline"
status: draft
cross_world_operator_version: 0.1.10
owner_role: developer
support_roles:
  - architect
  - quality-gate
  - governance-reviewer

goal: >
  Cross-world Operator Mode の MVP-008 として、worldbuilding extraction、public-safe validator、
  add request intake、orphan / stale / heartbeat trackingをdraft-only lifecycleとして定義する。

context:
  must_read:
    - AGENTS.md
    - docs/subagents/operating-model.md
    - docs/subagents/human-gates.md
    - docs/type1-public-pr-gate.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-mvp-007-repo-skill-distributed-ops.md
    - docs/cross-world-operator-mvp-008-intake-lifecycle-worldbuilding.md
  references:
    - docs/subagents/work-orders/wo-urban-026-cross-world-repo-skill-distributed-ops.yaml

scope:
  allowed_write_paths:
    - README.md
    - docs/cross-world-operator-mvp-008-intake-lifecycle-worldbuilding.md
    - docs/cross-world-operator-linear-drafts.md
    - docs/cross-world-operator-todo.md
    - docs/cross-world-operator-roadmap.md
    - docs/cross-world-operator-roadmap.html
    - docs/cross-world-operator-todo.html
    - docs/subagents/work-orders/wo-urban-027-cross-world-intake-lifecycle-worldbuilding.yaml
    - tools/docs_sync_check.py
    - tests/tools/test_docs_sync_check.py
  read_only_paths:
    - app/
    - docs/subagents/contracts/
  out_of_scope:
    - "この work order 作成 PR では実装コード、data contract、generated docsを変更しない。"
    - "GitHub issue、Linear issue、Discord投稿の自動作成を行わない。"
    - "private source content、外部投稿本文、私的path、固有作品名・キャラクター名を公開しない。"
    - "cloud resource作成、credential作成、billing変更、external API実行を行わない。"
    - "自動close、自動公開、自動mergeを行わない。"

contracts:
  consumes:
    - id: urban-ecosystem-data-contract
      version: 0.5.0
  produces: []

depends_on:
  work_orders:
    - wo-urban-026-cross-world-repo-skill-distributed-ops

human_gates:
  before_start:
    - G0
  before_implementation:
    - G1
  before_long_run:
    - G2
  before_claiming_result:
    - G3
  before_integration:
    - G4

commands:
  required:
    - "python tools/docs_sync_check.py --check"
    - "python -m pytest tests/ -q -p no:cacheprovider"
  optional:
    - "python -m pytest tests/tools/test_docs_sync_check.py -q -p no:cacheprovider"

acceptance:
  - "`docs/cross-world-operator-mvp-008-intake-lifecycle-worldbuilding.md` が追加され、intake lifecycleとworldbuilding pipelineを日本語で説明している。"
  - "`XWORLD-TODO-034`、`XWORLD-TODO-035`、`XWORLD-TODO-037`、`XWORLD-TODO-038` だけを MVP-008 の対象としている。"
  - "Cross-world Operator Mode docs package version を `0.1.10` にし、意味単位の自動version更新ルールに従っている。"
  - "worldbuilding extractionはsource本文ではなく構造抽出として扱う。"
  - "public-safe validatorはprotected names、private paths、external post body、secret-like stringsを検出対象にする。"
  - "GitHub / Linear / Discordへのauto-writeは人間レビュー前に行わない。"
  - "orphan threshold、stale self-report、heartbeatは自動closeや自動公開の根拠にしない。"
  - "実装コード、data contract、cloud/API、credentialは変更・作成していない。"

handoff:
  required_fields:
    - changed_files
    - tests_run
    - results_summary
    - risks
    - human_decisions_needed

notes:
  - "この work order は MVP-008 の実装着手前spec。Linear本体への起票は人間レビュー後の別stepにする。"
