name: Sync Cross-world roadmap HTML

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    name: regenerate roadmap HTML
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Regenerate generated docs
        run: python tools/docs_sync_check.py --write

      - name: Commit generated docs if changed
        run: |
          if git diff --quiet; then
            echo "No generated docs drift."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/generated/current-capabilities.md docs/cross-world-operator-roadmap.html
          git commit -m "docs: sync generated roadmap html"
          git push
