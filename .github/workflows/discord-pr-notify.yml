name: Discord PR notify

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      title:
        description: Test notification title
        required: false
        default: Discord PR notification test
      summary:
        description: Test notification summary
        required: false
        default: Manual test from GitHub Actions.

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Post PR to Discord
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          webhook_url = os.environ.get("DISCORD_WEBHOOK_URL")
          if not webhook_url:
              print("DISCORD_WEBHOOK_URL is not set; skipping Discord notification.")
              raise SystemExit(0)

          with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as event_file:
              event = json.load(event_file)

          if "pull_request" in event:
              pr = event["pull_request"]
              title = pr["title"]
              url = pr["html_url"]
              author = pr["user"]["login"]
              draft = pr["draft"]
              body = (pr.get("body") or "").strip()
              summary = body.splitlines()[0] if body else "No PR description yet."
              status = "Draft" if draft else "Ready"
          else:
              inputs = event.get("inputs", {})
              title = inputs.get("title") or "Discord PR notification test"
              url = os.environ["GITHUB_RUN_URL"]
              author = os.environ["GITHUB_ACTOR"]
              summary = inputs.get("summary") or "Manual test from GitHub Actions."
              status = "Manual test"
              draft = False

          if len(summary) > 240:
              summary = summary[:237] + "..."

          payload = {
              "username": "urban-ecosystem PR bot",
              "allowed_mentions": {"parse": []},
              "embeds": [
                  {
                      "title": title,
                      "url": url,
                      "description": summary,
                      "color": 5793266 if not draft else 10066329,
                      "fields": [
                          {"name": "Author", "value": author, "inline": True},
                          {"name": "Status", "value": status, "inline": True},
                      ],
                  }
              ],
          }

          request = urllib.request.Request(
              webhook_url,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=10) as response:
              if response.status >= 300:
                  raise SystemExit(f"Discord webhook failed: HTTP {response.status}")
          PY
